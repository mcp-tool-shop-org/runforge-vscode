name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'python/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'python/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Python deps for ml_runner boundary tests
        timeout-minutes: 10
        run: pip install scikit-learn pandas numpy joblib jsonschema

      - name: Install dependencies
        timeout-minutes: 10
        run: npm ci

      - name: Run tests
        timeout-minutes: 10
        run: npm test

      - name: Run tests with coverage
        if: matrix.node-version == '20'
        timeout-minutes: 15
        run: npx vitest run --coverage

      - name: Upload coverage to Codecov
        if: matrix.node-version == '20'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

      - name: Compile (production)
        timeout-minutes: 5
        run: npm run compile

      - name: Package VSIX
        if: matrix.node-version == '20'
        timeout-minutes: 10
        run: npx vsce package --no-dependencies

  dep-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        timeout-minutes: 10
        run: npm ci

      - name: Run npm audit
        timeout-minutes: 10
        run: npm audit --omit=dev || true

  # Extension Host smoke (FT-TEST-001 — CONTRACT-PHASE-4 §3.4).
  # Exercises the full call chain — extension activation → command dispatch →
  # Python subprocess spawn → run.json appearance → observability read →
  # markdown export — that the unit suite cannot reach. This is the testing
  # infrastructure that would have caught Marketplace v1.0.1's five
  # production-CRITICAL bugs.
  extension-host-smoke:
    runs-on: ubuntu-latest
    needs: quality-gates
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Python deps for ml_runner subprocess
        timeout-minutes: 10
        run: pip install scikit-learn pandas numpy joblib jsonschema

      - name: Install Node dependencies
        timeout-minutes: 10
        run: npm ci

      # Xvfb supplies a virtual display so VS Code Test Electron can launch
      # the Extension Host headlessly. Local runs on Mac/Windows do not need
      # this — VS Code launches headed by default.
      - name: Install Xvfb (headless display for Extension Host)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # The first run downloads stable VS Code (~150 MB) into .vscode-test/.
      # We do not cache .vscode-test/ across CI runs in this initial wave;
      # adding actions/cache against ~/.cache/vscode-test or .vscode-test/ is
      # a Wave 4 polish item if smoke time becomes a bottleneck.
      - name: Run Extension Host smoke tests
        timeout-minutes: 10
        run: xvfb-run -a npm run test:smoke
